site_name: Zeitdex
site_description: Community resources and documentation for circadian rhythm disorders (CRDs), including Non-24.
site_url: https://zeitdex.github.io/
repo_url: https://github.com/zeitdex/zeitdex.github.io
repo_name: zeitdex/zeitdex.github.io
edit_uri: edit/main/docs/

plugins:
  - search
  - gen-files:
      scripts:
        - scripts/gen_directory.py

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - content.action.edit
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - toc.follow

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.keys
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Basics:
      - Circadian rhythm & zeitgebers: basics/circadian-rhythm.md
  - Understanding Non-24:
      - Overview: conditions/non-24.md
      - Diagnosis: conditions/diagnosis.md
      - Treatment: conditions/treatment.md
      - Research & outlook: conditions/research.md
      - Recognising your pattern:
          - Overview: patterns/index.md
          - Trouble getting to sleep on time: patterns/late-sleep.md
          - Trouble sticking to a bedtime: patterns/day-length.md
          - Blocking out sunlight: patterns/sunlight.md
  - Other circadian disorders:
      - Overview: conditions/other/index.md
      - Delayed & advanced sleep phase: conditions/other/dspd-aspd.md
      - Irregular sleep-wake rhythm: conditions/other/iswrd.md
      - Shift work disorder: conditions/other/shift-work.md
  - Create a diary:
      - Overview: create/index.md
      - Supported formats: create/formats.md
      - Software: create/software.md
      - Reconstruct a diary: create/reconstruct.md
  - Find a specialist: find-a-specialist.md
  - Tracking:
      - Using Zeitlog: tracking/using-zeitlog.md
  - Resources:
      - Links & communities: resources/links.md
  - Contributing: contributing.md
