<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Zeitdex head-clock mark">
  <!--
    Head profile (svgrepo.com/svg/121924/head, CC0) centered in a 24-hour
    day/night ring. The small gold dial sits where the SCN lives: its ghost
    hand points at noon (where the world clock says), the solid hand points
    into the night (where the body clock actually is). The EEG trace below
    breaks into a tremor. Built for indigo #4051B5 / slate #1E2030 (MkDocs
    Material at zeitdex.github.io).
  -->

  <!-- Circadian ring: gold day arc, silver night arc -->
  <path d="M 5 32 A 27 27 0 0 1 59 32" fill="none" stroke="#E0A93B" stroke-width="3" stroke-linecap="round"/>
  <path d="M 59 32 A 27 27 0 0 1 5 32" fill="none" stroke="#D1D5DB" stroke-width="3" stroke-linecap="round"/>
  <!-- Noon sun / midnight beads -->
  <circle cx="32" cy="5" r="2.8" fill="#E0A93B"/>
  <circle cx="32" cy="59" r="2.2" fill="#D1D5DB"/>

  <!-- Head profile -->
  <g transform="translate(13,13) scale(0.08)" fill="#ECEFF1">
    <path d="M262.198,0c-28.1,0-55.1,6.1-80.3,18c-32,14.9-59.1,38.4-78.4,68c-19.9,30.5-30.4,65.8-30.4,102.3V214l-34,65
      c-6.5,12.5-6.8,25.3-0.8,35.3s17.5,15.7,31.6,15.7h3.2v51.1c0,27.7,22.5,50.2,50.2,50.2c0.7,0,1.3,0,2-0.1l34.9-5.2v35.1
      c0,0.5,0,1.1,0.1,1.6c1,12.4,11,21.6,23.7,21.6l0,0c1.5,0,3-0.1,4.6-0.4l181.5-32.2c13.2-2.3,23.6-14.7,23.6-28.1v-101
      c36.1-35.3,56.6-84,56.6-134.5C450.298,84.4,365.898,0,262.198,0z M370.998,306.8c-2.8,2.6-4.4,6.2-4.4,9.9v106.7
      c-0.1,0.5-0.8,1.4-1.3,1.6l-178.2,31.5l-0.1-46.5c0-3.9-1.7-7.7-4.7-10.2c-2.5-2.1-5.6-3.3-8.8-3.3c-0.7,0-1.3,0-2,0.1l-49.3,7.3
      c-12.4-0.5-22.3-10.7-22.3-23.2v-64.6c0-7.5-6-13.5-13.5-13.5h-16.5c-5.1,0-7.8-1.4-8.5-2.6s-0.8-4.3,1.6-8.8l35.6-67.9
      c1-1.9,1.5-4.1,1.5-6.3v-29c0-62.4,36.6-119.6,93.2-145.9h0.1c21.5-10,44.7-15.1,68.8-15.1c88.8,0,161.1,72.3,161.1,161.1
      C423.298,233.1,404.198,276.4,370.998,306.8z"/>
    <path d="M147.898,202.6c-9.8,0-17.8,8-17.8,17.8s8,17.8,17.8,17.8s17.8-8,17.8-17.8S157.698,202.6,147.898,202.6z"/>
  </g>

  <!-- Body clock in the cranium (the SCN) -->
  <circle cx="34.5" cy="27" r="7.5" fill="none" stroke="#E0A93B" stroke-width="2"/>
  <!-- ghost hand: where the world says it is (noon) -->
  <line x1="34.5" y1="27" x2="34.5" y2="21.5" stroke="#E0A93B" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- actual hand: pointing into the night -->
  <line x1="34.5" y1="27" x2="37.3" y2="31.8" stroke="#E0A93B" stroke-width="2" stroke-linecap="round"/>
  <circle cx="34.5" cy="27" r="1.4" fill="#E0A93B"/>

  <!-- EEG: calm baseline breaking into a tremor -->
  <path d="M 26 41 L 28.5 41 L 30 37.8 L 32.2 44.3 L 34.5 38.5 L 36.5 42.5 L 38.3 40.3 L 39.7 41.4 L 41.5 41"
        fill="none" stroke="#E0A93B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
