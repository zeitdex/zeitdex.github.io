name: Deploy Zeitdex to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check out resources data
        # The compiled specialist data (entities.json) lives on the resources
        # repo's "built" branch; the directory generator reads it from here.
        uses: actions/checkout@v6
        with:
          repository: zeitdex/resources
          ref: built
          path: resources-src
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - run: pip install -r requirements.txt
      - run: mkdocs build --site-dir _site
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
